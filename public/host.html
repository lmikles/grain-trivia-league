<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Tool — Grain Trivia League</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f2e1cf;
      --surface: #ffffff;
      --surf2:   #f9f0e6;
      --border:  #d4bfa3;
      --blue:    #3671b7;
      --blue-dk: #2a5a99;
      --green:   #9ab59e;
      --text:    #1a1209;
      --dim:     #7a6a56;
      --red:     #c0392b;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid var(--border);
    }
    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 800;
      color: var(--blue);
    }
    .subtitle {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: var(--dim);
    }
    .subtitle a { color: inherit; opacity: 0.7; font-size: 0.8em; }
    .subtitle a:hover { opacity: 1; }

    /* ── CARDS ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1.1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── FORM ──────────────────────────────────────────────────────────── */
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.35rem;
    }
    input, select {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      appearance: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { outline: 2px solid var(--blue); outline-offset: -1px; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { appearance: none; }
    input::placeholder { color: var(--border); }
    input:disabled, select:disabled {
      opacity: 0.6; cursor: not-allowed; background: var(--surf2);
    }
    select option { background: #fff; }
    .field { margin-bottom: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    @media(max-width:480px) { .grid-3 { grid-template-columns: 1fr 1fr; } }

    /* ── ROUND SCORES ──────────────────────────────────────────────────── */
    .rounds-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .round-field label {
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.1em;
    }
    .round-field input {
      text-align: center;
      padding: 0.55rem 0.4rem;
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* ── TOTAL BAR ─────────────────────────────────────────────────────── */
    .total-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 0.25rem;
    }
    .total-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 700;
    }
    .total-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--blue);
    }

    /* ── BUTTONS ───────────────────────────────────────────────────────── */
    .btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.75rem 1.25rem;
      transition: all 0.15s;
    }
    .btn-primary {
      width: 100%;
      background: var(--blue);
      color: #fff;
    }
    .btn-primary:hover { background: var(--blue-dk); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── AUTH SCREEN ───────────────────────────────────────────────────── */
    #authScreen { display: block; }
    #mainScreen { display: none; }
    .auth-icon { text-align: center; font-size: 2rem; margin-bottom: 0.75rem; }

    /* ── LOCK BADGE ────────────────────────────────────────────────────── */
    .lock-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      background: #e8f0fb;
      border: 1px solid #b8cff0;
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
    }

    /* ── LOG ───────────────────────────────────────────────────────────── */
    .log-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.75rem;
    }
    .log-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .log-item:last-child { border-bottom: none; }
    .log-team { font-weight: 700; }
    .log-pts { font-size: 1rem; font-weight: 800; color: var(--blue); }

    /* ── MESSAGES ──────────────────────────────────────────────────────── */
    .msg {
      margin-top: 0.75rem;
      padding: 0.65rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.error   { display:block; background:#fce8e6; border:1px solid #e6b3b0; color:#8b1a14; }
    .msg.success { display:block; background:#e8f5ec; border:1px solid #b3d9bf; color:#1a5c2e; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">Grain Craft Bar + Kitchen</div>
    <h1>Host Tool</h1>
    <div class="subtitle">
      Score entry — internal use only &nbsp;|&nbsp;
      <a href="/generator.html">Question Generator →</a>
    </div>
  </header>

  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div class="card">
      <div class="auth-icon">🔐</div>
      <div class="field">
        <label for="secretInput">Host Secret Key</label>
        <input type="password" id="secretInput" placeholder="Enter your host key" />
      </div>
      <button class="btn btn-primary" id="unlockBtn" onclick="unlock()">Unlock</button>
      <div class="msg" id="authMsg"></div>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen">

    <!-- Game night setup -->
    <div class="card">
      <div class="card-title">
        Tonight's Game
        <span id="lockedBadge" class="lock-badge" style="display:none;float:right">🔒 <span id="lockedLocName"></span></span>
      </div>
      <div class="grid-3">
        <div class="field" style="margin:0">
          <label for="location">Location</label>
          <select id="location" onchange="loadTeams()">
            <option value="Main Street">Main Street</option>
            <option value="Exchange">Exchange</option>
            <option value="H2O">H2O</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label for="week">Week</label>
          <input type="number" id="week" value="1" min="1" max="52" />
        </div>
        <div class="field" style="margin:0">
          <label for="gameDate">Date</label>
          <input type="date" id="gameDate" />
        </div>
      </div>
    </div>

    <!-- Score entry -->
    <div class="card">
      <div class="card-title">Enter Score</div>

      <div class="field">
        <label for="teamSelect">Team</label>
        <select id="teamSelect">
          <option value="">— loading teams… —</option>
        </select>
      </div>

      <div style="margin-bottom:0.75rem">
        <label>Round Scores (leave blank if not played)</label>
        <div class="rounds-grid">
          <div class="round-field"><label>Round 1</label><input type="number" id="r1" min="0" oninput="updateTotal()" /></div>
          <div class="round-field"><label>Round 2</label><input type="number" id="r2" min="0" oninput="updateTotal()" /></div>
          <div class="round-field"><label>Round 3</label><input type="number" id="r3" min="0" oninput="updateTotal()" /></div>
          <div class="round-field"><label>Lightning</label><input type="number" id="r4" min="0" oninput="updateTotal()" /></div>
          <div class="round-field"><label>Last Call</label><input type="number" id="r5" min="0" oninput="updateTotal()" /></div>
          <div class="round-field"><label>Bonus</label><input type="number" id="r6" min="0" oninput="updateTotal()" /></div>
        </div>
        <div class="total-bar">
          <span class="total-label">Total Score</span>
          <span class="total-value" id="totalDisplay">0</span>
        </div>
      </div>

      <div class="field">
        <label for="submittedBy">Your Name (host)</label>
        <input type="text" id="submittedBy" placeholder="Host name" />
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="submitScore()">Submit Score</button>
      <div class="msg" id="scoreMsg"></div>
    </div>

    <!-- Submitted tonight -->
    <div class="card" id="logCard" style="display:none">
      <div class="log-title">Submitted Tonight</div>
      <div id="scoreLog"></div>
    </div>

  </div><!-- /mainScreen -->
</div>

<script>
let hostSecret = '';
let userRole   = '';   // 'admin' | 'host'
let submittedScores = [];

// ── Auth ──────────────────────────────────────────────────────────────
document.getElementById('secretInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function unlock() {
  const val = document.getElementById('secretInput').value.trim();
  const msg = document.getElementById('authMsg');
  const btn = document.getElementById('unlockBtn');

  if (!val) { showMsg('authMsg', 'error', 'Please enter the host key.'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking…';
  msg.className = 'msg';

  try {
    const resp = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: val }),
    });
    const data = await resp.json();

    if (!resp.ok || !data.ok) {
      showMsg('authMsg', 'error', 'Invalid host key — try again.');
      btn.disabled = false;
      btn.textContent = 'Unlock';
      return;
    }

    hostSecret = val;
    userRole   = data.role;

    if (data.role === 'host' && data.location) {
      // Lock location to this store
      const locSel = document.getElementById('location');
      locSel.value    = data.location;
      locSel.disabled = true;

      document.getElementById('lockedLocName').textContent = data.location;
      document.getElementById('lockedBadge').style.display = 'inline-flex';
    }

    showMainScreen();

  } catch (err) {
    showMsg('authMsg', 'error', 'Connection error — check your network and try again.');
    btn.disabled = false;
    btn.textContent = 'Unlock';
  }
}

function showMainScreen() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  document.getElementById('gameDate').value = new Date().toISOString().slice(0, 10);
  loadTeams();
}

// ── Teams dropdown ────────────────────────────────────────────────────
async function loadTeams() {
  const location = document.getElementById('location').value;
  const sel = document.getElementById('teamSelect');
  sel.innerHTML = '<option value="">Loading…</option>';
  try {
    const res = await fetch(`/api/teams?location=${encodeURIComponent(location)}`);
    const data = await res.json();
    if (!data.teams || !data.teams.length) {
      sel.innerHTML = '<option value="">No teams registered yet</option>';
    } else {
      sel.innerHTML = '<option value="">— select a team —</option>' +
        data.teams.map(t => `<option value="${escAttr(t.teamId)}" data-name="${escAttr(t.teamName)}">${escHtml(t.teamName)}</option>`).join('');
    }
  } catch(e) {
    sel.innerHTML = '<option value="">Error loading teams</option>';
  }
}

// ── Score calculation ─────────────────────────────────────────────────
function updateTotal() {
  const ids = ['r1','r2','r3','r4','r5','r6'];
  const total = ids.reduce((sum, id) => {
    const v = parseFloat(document.getElementById(id).value);
    return sum + (isNaN(v) ? 0 : v);
  }, 0);
  document.getElementById('totalDisplay').textContent = total % 1 === 0 ? total : total.toFixed(1);
}

// ── Submit score ──────────────────────────────────────────────────────
async function submitScore() {
  const sel      = document.getElementById('teamSelect');
  const teamId   = sel.value;
  const teamName = sel.options[sel.selectedIndex]?.dataset.name || '';
  const location = document.getElementById('location').value;
  const week     = document.getElementById('week').value;
  const date     = document.getElementById('gameDate').value;
  const submittedBy = document.getElementById('submittedBy').value.trim();
  const btn      = document.getElementById('submitBtn');

  if (!teamId) { showMsg('scoreMsg', 'error', 'Please select a team.'); return; }
  if (!date)   { showMsg('scoreMsg', 'error', 'Please enter a date.');   return; }

  const roundIds = ['r1','r2','r3','r4','r5','r6'];
  const rounds = roundIds
    .map(id => document.getElementById(id).value)
    .filter(v => v !== '')
    .map(Number);

  const total = rounds.reduce((s, v) => s + v, 0);

  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const res = await fetch('/api/scores', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${hostSecret}`,
      },
      body: JSON.stringify({ teamId, teamName, location, week, date, rounds, bonusRound: 0, submittedBy }),
    });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) {
        showMsg('scoreMsg', 'error', 'Session expired — please refresh and log in again.');
      } else {
        throw new Error(data.error || 'Submission failed');
      }
      return;
    }

    submittedScores.unshift({ teamName, total, location, week });
    renderLog();
    clearScoreForm();
    showMsg('scoreMsg', 'success', `✓ ${escHtml(teamName)} — ${total} points recorded.`);

  } catch(err) {
    showMsg('scoreMsg', 'error', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Score';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────
function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = `msg ${type}`;
  el.innerHTML = text;
}

function clearScoreForm() {
  ['r1','r2','r3','r4','r5','r6'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('teamSelect').value = '';
  document.getElementById('totalDisplay').textContent = '0';
}

function renderLog() {
  const card = document.getElementById('logCard');
  const log  = document.getElementById('scoreLog');
  if (!submittedScores.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  log.innerHTML = submittedScores.map(s => `
    <div class="log-item">
      <div>
        <div class="log-team">${escHtml(s.teamName)}</div>
        <div style="font-size:0.78rem;color:var(--dim)">${escHtml(s.location)} · Week ${s.week}</div>
      </div>
      <div class="log-pts">${s.total}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }
</script>
</body>
</html>
