<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings — Grain Trivia League</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f2e1cf;
      --surface: #ffffff;
      --surf2:   #f9f0e6;
      --border:  #d4bfa3;
      --blue:    #3671b7;
      --green:   #9ab59e;
      --text:    #1a1209;
      --dim:     #7a6a56;
      --gold:    #c9860a;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--blue);
      color: #fff;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 0.9rem; opacity: 0.85; }
    header nav { margin-left: auto; display: flex; gap: 1rem; }
    header nav a { color: #fff; text-decoration: none; font-size: 0.85rem; opacity: 0.85; }
    header nav a:hover { opacity: 1; text-decoration: underline; }

    .container {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
    }

    /* Location filter */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .filter-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      color: var(--dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      transition: all 0.12s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--text); }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* Meta row */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .meta-count { font-size: 0.8rem; color: var(--dim); }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      transition: all 0.12s;
    }
    .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* Table */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      background: var(--surf2);
      padding: 0.6rem 0.9rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--dim);
      border-bottom: 1px solid var(--border);
    }
    th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surf2); }
    td { padding: 0.7rem 0.9rem; vertical-align: middle; }
    td.num { text-align: right; color: var(--dim); }

    .rank-cell { font-weight: 800; color: var(--dim); }
    tbody tr.rank-1 td.rank-cell { color: #c9860a; font-size: 1.1rem; }
    tbody tr.rank-2 td.rank-cell { color: #888; font-size: 1.05rem; }
    tbody tr.rank-3 td.rank-cell { color: #a0622a; }
    .team-name-cell { font-weight: 700; }
    .location-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dim);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.15rem 0.55rem;
    }
    .points-cell {
      font-size: 1rem;
      font-weight: 800;
      color: var(--blue);
      text-align: right;
    }

    /* States */
    .state-msg {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--dim);
      font-size: 0.9rem;
    }
    .loading-dots span { animation: blink 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2}40%{opacity:1} }

    /* Footer */
    .footer-meta {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--dim);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .nav-links a {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .nav-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>🍺 Grain Trivia League</h1>
  <span>Grain Craft Bar + Kitchen — Delaware</span>
  <nav>
    <a href="/register.html">Register</a>
    <a href="/standings.html">Season Standings</a>
    <a href="/">Home</a>
  </nav>
</header>

<div class="container">
  <h1 style="font-size:1.4rem;font-weight:800;color:var(--blue);margin-bottom:1.25rem">Season Standings</h1>

  <div class="filter-bar">
    <button class="filter-btn active" data-location="">All Locations</button>
    <button class="filter-btn" data-location="Main Street">Main Street</button>
    <button class="filter-btn" data-location="Exchange">Exchange</button>
    <button class="filter-btn" data-location="H2O">H2O</button>
  </div>

  <div class="meta-row">
    <div class="meta-count" id="metaCount"></div>
    <button class="refresh-btn" onclick="loadStandings()">↺ Refresh</button>
  </div>

  <div class="card">
    <div class="table-wrap">
      <div id="tableContainer">
        <div class="state-msg">
          Loading standings<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-meta" id="footerMeta"></div>

  <div class="nav-links">
    <a href="/register.html">Register a Team</a>
    <a href="/standings.html">Full Season Standings</a>
    <a href="/">Home</a>
  </div>
</div>

<script>
let currentLocation = '';
let refreshTimer;

const RANK_EMOJI = { 1: '🥇', 2: '🥈', 3: '🥉' };

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLocation = btn.dataset.location;
    loadStandings();
  });
});

async function loadStandings() {
  const container = document.getElementById('tableContainer');
  container.innerHTML = '<div class="state-msg">Loading standings<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></div>';
  document.getElementById('metaCount').textContent = '';

  try {
    const url = '/api/standings' + (currentLocation ? `?location=${encodeURIComponent(currentLocation)}` : '');
    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Failed to load');

    const { standings, lastUpdated } = data;

    if (!standings.length) {
      container.innerHTML = '<div class="state-msg">No scores recorded yet — check back after game night!</div>';
      document.getElementById('footerMeta').textContent = '';
      return;
    }

    const locLabel = currentLocation || 'All Locations';
    document.getElementById('metaCount').textContent =
      `${standings.length} team${standings.length !== 1 ? 's' : ''} · ${locLabel}`;
    document.getElementById('footerMeta').textContent = lastUpdated
      ? `Updated ${new Date(lastUpdated).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}`
      : '';

    const rows = standings.map(s => {
      const rankDisplay = RANK_EMOJI[s.rank] || `#${s.rank}`;
      return `
        <tr class="rank-${s.rank}">
          <td class="rank-cell">${rankDisplay}</td>
          <td class="team-name-cell">${escHtml(s.teamName)}</td>
          <td><span class="location-badge">${escHtml(s.location)}</span></td>
          <td class="num">${s.gamesPlayed}</td>
          <td class="points-cell">${s.totalPoints.toLocaleString()}</td>
          <td class="num">${s.averageScore.toFixed(1)}</td>
          <td class="num">${s.bestScore.toLocaleString()}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th style="width:48px">Rank</th>
            <th>Team</th>
            <th>Location</th>
            <th class="num">Played</th>
            <th class="num">Total Pts</th>
            <th class="num">Avg</th>
            <th class="num">Best</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

  } catch (err) {
    container.innerHTML = `<div class="state-msg">Couldn't load standings: ${escHtml(err.message)}</div>`;
  }
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => { loadStandings(); scheduleRefresh(); }, 60000);
}

loadStandings();
scheduleRefresh();
</script>
</body>
</html>
